<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icon-192.png">
<title>PAPER</title>
<style>
*{box-sizing:border-box}body{margin:0;background:#eef1f5;color:#151923;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;padding:18px 14px 80px}.wrap{max-width:720px;margin:auto}header{display:flex;align-items:center;gap:10px;margin-bottom:16px}.logo{width:34px;height:34px;border-radius:10px;background:#111827;color:#fff;display:grid;place-items:center;font-weight:800}.sub{font-size:12px;color:#687386}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;position:sticky;top:0;background:#eef1f5;padding:6px 0;z-index:5}.tabs button,.btn{border:1px solid #cfd5de;background:#fff;border-radius:9px;padding:10px;font-weight:650}.tabs button.active,.btn.primary{background:#111827;color:#fff;border-color:#111827}.panel{display:none}.panel.active{display:block}.card{background:#fff;border:1px solid #d9dee6;border-radius:14px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(20,30,50,.05)}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.k{font-size:11px;color:#737d8c}.v{font-size:18px;font-weight:750}.up{color:#13865b}.down{color:#d22d43}input,select,textarea{width:100%;border:1px solid #cfd5de;border-radius:9px;padding:10px;background:#fff;font:inherit}label{display:block;font-size:12px;color:#667085;margin:9px 0 4px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{cursor:pointer}.btn.danger{color:#c92a3f}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;border-top:1px solid #edf0f4;padding-top:10px;margin-top:10px}.badge{font-size:10px;padding:3px 7px;border-radius:999px;background:#e9eef5;color:#445063}.empty{text-align:center;color:#7b8492;padding:28px 10px}.mono{font-variant-numeric:tabular-nums}.note{font-size:11px;color:#6b7482;line-height:1.6}.wide{grid-column:1/-1}@media(max-width:520px){.tabs button{font-size:12px;padding:9px 4px}}
</style>
</head>
<body><div class="wrap">
<header><div class="logo">P</div><div><b>PAPER</b><div class="sub">FRAME → ENTRY → EXIT</div></div><div style="margin-left:auto;display:flex;gap:6px"><a class="btn" href="https://miyabom1-wq.github.io/cockpit/" style="text-decoration:none;font-size:12px">VANTAGE</a><button id="installApp" class="btn" style="font-size:12px">インストール</button></div></header>
<div class="tabs"><button data-tab="positions" class="active">建玉</button><button data-tab="entry">ENTRY</button><button data-tab="history">履歴</button><button data-tab="stats">成績</button></div>
<section id="positions" class="panel active"></section>
<section id="entry" class="panel"><div class="card"><b>仮想エントリー</b><div class="grid">
<div><label>市場</label><select id="market"><option value="jp">日本株</option><option value="us">米国株</option></select></div><div><label>銘柄コード</label><input id="symbol" placeholder="285A / MU"></div>
<div><label>銘柄名</label><input id="name" placeholder="キオクシア"></div><div><label>FRAME状態</label><select id="frame"><option>READY</option><option>TRIGGERED</option><option>WAIT</option></select></div>
<div><label>約定価格</label><input id="price" type="number" step="any"></div><div><label>数量</label><input id="qty" type="number" step="any"></div>
<div><label>損切価格</label><input id="stop" type="number" step="any"></div><div><label>目標価格</label><input id="target" type="number" step="any"></div>
<div><label>VANTAGE判定</label><input id="lane" placeholder="B・反転初動"></div><div><label>地合い</label><input id="regime" placeholder="通常 / 弱い"></div>
<div class="wide"><label>エントリー根拠</label><textarea id="thesis" placeholder="出来高、RS、押し目、再加速条件など"></textarea></div>
<div class="wide"><label>無効化条件</label><textarea id="invalid" placeholder="終値で5日線割れ、前日安値割れなど"></textarea></div></div>
<div class="actions"><button class="btn primary" id="add">エントリー登録</button><button class="btn" id="loadVantage">VANTAGEを開く</button><button class="btn" id="backup">CSV出力</button></div><div id="vantageList" class="note"></div></div></section>
<section id="history" class="panel"></section><section id="stats" class="panel"></section>
</div>
<script>
const KEY='paper-trades-v1';let db=JSON.parse(localStorage.getItem(KEY)||'{"positions":[],"history":[]}');
const save=()=>localStorage.setItem(KEY,JSON.stringify(db));const n=x=>Number(x||0);const fmt=x=>new Intl.NumberFormat('ja-JP',{maximumFractionDigits:2}).format(x);
function tabs(){document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active');render()})}
function render(){renderPositions();renderHistory();renderStats()}
function renderPositions(){let el=document.getElementById('positions');if(!db.positions.length){el.innerHTML='<div class="card empty">建玉はありません</div>';return}el.innerHTML=db.positions.map(p=>{let cur=n(p.current||p.avg),pl=(cur-p.avg)*p.qty,rate=(cur/p.avg-1)*100,risk=(p.avg-p.stop)*p.qty,r=risk>0?pl/risk:0;return `<div class="card"><div style="display:flex;justify-content:space-between"><div><b>${p.name||p.symbol}</b><div class="sub">${p.symbol} · ${p.market.toUpperCase()} · ${p.frame}</div></div><span class="badge">${p.lane||'未分類'}</span></div><div class="grid" style="margin-top:12px"><div><div class="k">平均取得</div><div class="v mono">${fmt(p.avg)}</div></div><div><div class="k">現在値</div><input class="cur" data-id="${p.id}" type="number" step="any" value="${cur}"></div><div><div class="k">含み損益</div><div class="v ${pl>=0?'up':'down'} mono">${pl>=0?'+':''}${fmt(pl)}</div></div><div><div class="k">損益率 / R</div><div class="v ${rate>=0?'up':'down'} mono">${rate.toFixed(2)}% / ${r.toFixed(2)}R</div></div></div><div class="note">損切 ${fmt(p.stop)} ｜ 目標 ${fmt(p.target)}<br>${p.thesis||''}</div><div class="actions"><button class="btn" onclick="exitTrade('${p.id}',true)">一部EXIT</button><button class="btn danger" onclick="exitTrade('${p.id}',false)">全EXIT</button></div></div>`}).join('');document.querySelectorAll('.cur').forEach(i=>i.onchange=()=>{let p=db.positions.find(x=>x.id===i.dataset.id);p.current=n(i.value);save();render()})}
function renderHistory(){let el=document.getElementById('history');if(!db.history.length){el.innerHTML='<div class="card empty">決済履歴はありません</div>';return}el.innerHTML=db.history.slice().reverse().map(t=>`<div class="card"><b>${t.name||t.symbol}</b><div class="sub">${t.symbol} · ${t.reason}</div><div class="row"><span>${t.qty}株　${fmt(t.entry)} → ${fmt(t.exit)}</span><b class="${t.pnl>=0?'up':'down'}">${t.pnl>=0?'+':''}${fmt(t.pnl)}</b></div></div>`).join('')}
function renderStats(){let h=db.history,total=h.reduce((s,x)=>s+x.pnl,0),wins=h.filter(x=>x.pnl>0),loss=h.filter(x=>x.pnl<0),gp=wins.reduce((s,x)=>s+x.pnl,0),gl=Math.abs(loss.reduce((s,x)=>s+x.pnl,0)),pf=gl?gp/gl:gp?99:0,wr=h.length?wins.length/h.length*100:0;document.getElementById('stats').innerHTML=`<div class="card"><div class="grid"><div><div class="k">確定損益</div><div class="v ${total>=0?'up':'down'}">${total>=0?'+':''}${fmt(total)}</div></div><div><div class="k">勝率</div><div class="v">${wr.toFixed(1)}%</div></div><div><div class="k">Profit Factor</div><div class="v">${pf.toFixed(2)}</div></div><div><div class="k">完了トレード</div><div class="v">${h.length}</div></div></div></div>`}
function addTrade(){let p={id:crypto.randomUUID(),market:market.value,symbol:symbol.value.trim().toUpperCase(),name:name.value.trim(),frame:frame.value,avg:n(price.value),qty:n(qty.value),stop:n(stop.value),target:n(target.value),lane:lane.value.trim(),regime:regime.value.trim(),thesis:thesis.value.trim(),invalid:invalid.value.trim(),opened:new Date().toISOString()};if(!p.symbol||p.avg<=0||p.qty<=0)return alert('銘柄コード・価格・数量を入力してください');db.positions.push(p);save();document.querySelector('[data-tab="positions"]').click()}
window.exitTrade=(id,partial)=>{let p=db.positions.find(x=>x.id===id);let q=partial?n(prompt('決済数量',Math.max(1,Math.floor(p.qty/2)))):p.qty;if(!q||q>p.qty)return;let ep=n(prompt('EXIT価格',p.current||p.avg));if(!ep)return;let reason=prompt('EXIT理由','5日線終値割れ')||'未記入';db.history.push({id:crypto.randomUUID(),symbol:p.symbol,name:p.name,qty:q,entry:p.avg,exit:ep,pnl:(ep-p.avg)*q,reason,opened:p.opened,closed:new Date().toISOString(),lane:p.lane,regime:p.regime,frame:p.frame});p.qty-=q;if(p.qty<=0)db.positions=db.positions.filter(x=>x.id!==id);save();render()}
function loadVantageCandidates(){
  window.open('https://miyabom1-wq.github.io/cockpit/','_blank','noopener');
}
window.pick=(s,nm)=>{symbol.value=s.replace('.T','');name.value=nm};name.value=nm};
function csv(){let rows=[['symbol','name','qty','entry','exit','pnl','reason','opened','closed'],...db.history.map(x=>[x.symbol,x.name,x.qty,x.entry,x.exit,x.pnl,x.reason,x.opened,x.closed])];let blob=new Blob(['\ufeff'+rows.map(r=>r.map(v=>`"${String(v??'').replaceAll('"','""')}"`).join(',')).join('\n')],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='paper-history.csv';a.click()}
let installPrompt=null;
const installButton=document.getElementById('installApp');
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();installPrompt=e;installButton.textContent='インストール';
});
installButton.onclick=async()=>{
  if(!installPrompt){alert('Chromeの通常タブで開き、右上の︙から「アプリをインストール」または「ホーム画面に追加」を選択してください。既にインストール済みの場合は、このボタンではなくPAPERアイコンから起動します。');return;}
  installPrompt.prompt();await installPrompt.userChoice;installPrompt=null;installButton.style.display='none';
};
window.addEventListener('appinstalled',()=>{installButton.textContent='インストール済み'});
const qp=new URLSearchParams(location.search);
if(qp.get('symbol')){
  symbol.value=qp.get('symbol')||'';
  name.value=qp.get('name')||'';
  frame.value=qp.get('frame')||'READY';
  lane.value=qp.get('lane')||'';
  regime.value=qp.get('regime')||'';
  document.querySelector('[data-tab="entry"]').click();
}
tabs();add.onclick=addTrade;loadVantage.onclick=loadVantageCandidates;backup.onclick=csv;render();
if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js',{scope:'./'});
</script></body></html>
